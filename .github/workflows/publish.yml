name: Publish to Modrinth

on:
  push:
    tags:
      - 'v*'          # triggers on: git tag v2.0.0 && git push --tags
  workflow_dispatch:  # manual trigger from GitHub UI

env:
  JAVA_VERSION: 25

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build mod
        run: ./gradlew clean build

      # ── Publish to Modrinth ──────────────────────────────────────────────
      # Uses mc-publish action (supports Modrinth natively)
      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # Your Modrinth project ID — get it from:
          # modrinth.com/mod/YOUR-MOD-SLUG → right panel → Project ID
          modrinth-id: lightmod

          # Create this token at: modrinth.com/settings/pats
          # Add it to GitHub: repo Settings → Secrets → MODRINTH_TOKEN
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          # Version info — auto-read from tag name (e.g. v2.0.0 → 2.0.0)
          version: ${{ github.ref_name }}
          version-type: release

          # Which loaders and MC versions this release supports
          loaders: |
            fabric
          game-versions: |
            26.1.2
            26.2

          # Changelog from CHANGELOG.md (create this file next to README.md)
          changelog-file: CHANGELOG.md

          # The built jar
          files: build/libs/!(*-sources).jar

          # Dependencies shown on Modrinth
          dependencies: |
            fabric-api | required | modrinth:P7dR8mSH
            cloth-config | required | modrinth:9s6osm5g
            sodium | optional | modrinth:AANobbMI
            iris | optional | modrinth:YL57xq9U
            modmenu | optional | modrinth:mOgUt4GM
